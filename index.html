<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#07111f" />
  <link rel="manifest" href="manifest.json" />
  <title>Double Decision</title>
  <style>
    :root{--bg:#07111f;--panel:rgba(5,14,26,.82);--line:rgba(255,255,255,.16);--text:#f7fbff;--muted:#b9c8d8;--blue:#1479e8;--green:#2eaa32;--red:#d72d28;--yellow:#e4ad20}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent} html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:var(--text)}
    button{font:inherit;color:inherit;border:0} .app{height:100svh;display:flex;flex-direction:column;background:#07111f;position:relative;overflow:hidden}
    .hud{height:70px;display:grid;grid-template-columns:1fr 1fr 1.2fr 1fr 1fr;gap:8px;padding:8px 12px;background:linear-gradient(180deg,rgba(4,10,18,.96),rgba(4,10,18,.74));z-index:5;align-items:center}
    .stat,.targetBox{height:54px;border:1px solid var(--line);border-radius:10px;background:rgba(4,14,27,.72);display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 8px 24px rgba(0,0,0,.25)}
    .stat .big{font-size:25px;font-weight:800}.stat .label{font-size:13px;color:var(--muted)}.targetBox{font-weight:800}.targetSign{font-size:42px;filter:drop-shadow(0 3px 3px rgba(0,0,0,.5))}
    .scene{position:relative;flex:1;min-height:0;overflow:hidden;background:linear-gradient(#92cdf4 0 28%,#c9e6f6 28% 38%,#8ea2af 38% 100%)}
    .scene::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 50% 22%,rgba(255,255,255,.8),transparent 18%),linear-gradient(90deg,rgba(255,255,255,.1),transparent 18%,transparent 82%,rgba(255,255,255,.08));opacity:.55}
    .buildings{position:absolute;inset:0 0 33% 0;overflow:hidden}.b{position:absolute;bottom:0;background:linear-gradient(90deg,#263746,#536777 55%,#2d3e4d);border-left:1px solid rgba(255,255,255,.25);border-right:1px solid rgba(0,0,0,.35);box-shadow:inset 0 0 18px rgba(255,255,255,.06)}
    .b::after{content:"";position:absolute;inset:8px;background:repeating-linear-gradient(0deg,transparent 0 19px,rgba(255,255,255,.2) 20px 24px,transparent 25px 40px),repeating-linear-gradient(90deg,transparent 0 17px,rgba(12,24,38,.65) 18px 28px,transparent 29px 44px)}
    .left1{left:-4%;width:18%;height:86%}.left2{left:14%;width:14%;height:70%}.left3{left:29%;width:10%;height:55%}.left4{left:39%;width:8%;height:42%}.right1{right:-3%;width:20%;height:88%}.right2{right:17%;width:13%;height:74%}.right3{right:31%;width:10%;height:54%}.right4{right:42%;width:7%;height:42%}
    .trees{position:absolute;inset:26% 0 33% 0}.tree{position:absolute;bottom:0;width:28px;height:95px}.tree::before{content:"";position:absolute;bottom:0;left:12px;width:6px;height:58px;background:#5a3b25}.tree::after{content:"";position:absolute;top:0;left:-12px;width:52px;height:52px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#80ad37,#2f6b2c 70%);box-shadow:10px 15px 0 #3f7b31,-8px 18px 0 #4d8d37}
    .road{position:absolute;left:0;right:0;bottom:0;height:50%;clip-path:polygon(42% 0,58% 0,100% 100%,0 100%);background:linear-gradient(90deg,#3c4349,#222930 50%,#3d4449);box-shadow:inset 0 24px 44px rgba(0,0,0,.35)}
    .road::after{content:"";position:absolute;left:49.4%;top:3%;width:1.2%;height:100%;background:repeating-linear-gradient(180deg,#f4f3e8 0 28px,transparent 29px 65px);transform:perspective(180px) rotateX(30deg);opacity:.9}.sidewalk{position:absolute;bottom:0;height:51%;width:36%;background:linear-gradient(#82888c,#505a61);opacity:.75}.sidewalk.left{left:0;clip-path:polygon(0 0,70% 0,0 100%)}.sidewalk.right{right:0;clip-path:polygon(30% 0,100% 0,100% 100%)}
    .crosswalk{position:absolute;left:35%;right:35%;top:47%;height:11%;background:repeating-linear-gradient(90deg,rgba(255,255,255,.75) 0 26px,transparent 27px 45px);transform:perspective(160px) rotateX(45deg);opacity:.55}
    .prop,.stim{position:absolute;transform:translate(-50%,-50%);user-select:none}.prop{font-size:clamp(22px,5vw,38px);opacity:.9;filter:drop-shadow(0 3px 3px rgba(0,0,0,.45))}.stim{z-index:3}.signStim{font-size:clamp(34px,7vw,56px);filter:drop-shadow(0 4px 5px rgba(0,0,0,.5))}.carStim{left:50%;top:66%;width:min(29vw,170px);height:auto;filter:drop-shadow(0 12px 14px rgba(0,0,0,.55))}.tapMarker{position:absolute;width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;transform:translate(-50%,-50%);z-index:4;background:rgba(255,255,255,.93)}
    .bottom{background:linear-gradient(180deg,rgba(4,10,18,.82),rgba(4,10,18,.97));border-top:1px solid var(--line);padding:10px 14px calc(10px + env(safe-area-inset-bottom));z-index:6}.settings{display:grid;grid-template-columns:1.1fr 1fr 1.15fr 1.15fr 1fr 1fr;gap:10px;align-items:stretch}.card{border:1px solid var(--line);border-radius:10px;background:rgba(7,19,34,.78);padding:10px}.card h3{margin:0 0 7px;font-size:13px;letter-spacing:.04em;text-transform:uppercase}.small{font-size:12px;color:var(--muted);margin-bottom:7px}.btns{display:flex;gap:6px;flex-wrap:wrap}.opt{min-width:48px;padding:9px 9px;border-radius:8px;background:rgba(255,255,255,.05);border:1px solid var(--line)}.opt.sel{background:linear-gradient(#1685f2,#0b4d98);border-color:#42a0ff}.start{height:100%;min-height:86px;border-radius:14px;background:linear-gradient(#4fc143,#218921);font-size:20px;font-weight:900;box-shadow:0 8px 20px rgba(0,0,0,.35)}
    .overlay{position:absolute;inset:70px 0 0;display:none;align-items:center;justify-content:center;z-index:7;background:rgba(2,8,16,.18);padding:18px}.modal{width:min(760px,94vw);border:1px solid var(--line);border-radius:18px;background:rgba(5,15,28,.92);box-shadow:0 20px 70px rgba(0,0,0,.55);padding:18px;text-align:center}.modal h2{margin:4px 0 12px}.carChoices{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.carChoice{background:rgba(255,255,255,.06);border:1px solid var(--line);border-radius:12px;padding:8px}.carChoice svg{width:100%;height:72px}.feedback{font-size:18px;margin-top:8px;color:var(--muted)}
    .introCars{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:8px}.introCars svg{width:100%;height:58px;background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:8px}.hide{display:none!important}
    @media(max-width:760px){.hud{height:64px;grid-template-columns:1fr 1fr 1.3fr}.hud .stat:nth-last-child(-n+2){display:none}.settings{grid-template-columns:1fr 1fr}.bottom{max-height:46svh;overflow:auto}.carStim{width:35vw}.carChoices{grid-template-columns:repeat(2,1fr)}}
  </style>
</head>
<body>
<div class="app">
  <header class="hud">
    <div class="stat"><span>🏆</span><div><div class="label">Poeng</div><div class="big" id="score">0</div></div></div>
    <div class="stat"><span>⭐</span><div><div class="label">Nivå</div><div class="big" id="level">1</div></div></div>
    <div class="targetBox">FINN: <span class="targetSign" id="targetHud">🛑</span></div>
    <div class="stat"><span>🎯</span><div><div class="label">Treff</div><div class="big" id="hit">–%</div></div></div>
    <div class="stat"><span>⏱️</span><div><div class="label">Snittid</div><div class="big" id="avg">–s</div></div></div>
  </header>

  <main class="scene" id="scene">
    <div class="buildings"><div class="b left1"></div><div class="b left2"></div><div class="b left3"></div><div class="b left4"></div><div class="b right1"></div><div class="b right2"></div><div class="b right3"></div><div class="b right4"></div></div>
    <div class="trees"><div class="tree" style="left:8%"></div><div class="tree" style="left:20%"></div><div class="tree" style="left:33%"></div><div class="tree" style="right:8%"></div><div class="tree" style="right:22%"></div><div class="tree" style="right:35%"></div></div>
    <div class="sidewalk left"></div><div class="sidewalk right"></div><div class="road"></div><div class="crosswalk"></div>
    <div id="props"></div><div id="stimuli"></div><div id="markers"></div>
  </main>

  <section class="bottom" id="startPanel">
    <div class="settings">
      <div class="card"><h3>Biler du kan se</h3><div class="introCars" id="introCars"></div></div>
      <div class="card"><h3>Målskilt</h3><div class="small">Velg skiltet du skal finne.</div><div class="btns" id="signBtns"></div></div>
      <div class="card"><h3>Eksponeringstid</h3><div class="small">Hvor lenge bil og skilt vises.</div><div class="btns" id="timeBtns"></div></div>
      <div class="card"><h3>Hastighet (m/s)</h3><div class="small">Gir poengbonus.</div><div class="btns" id="speedBtns"></div></div>
      <div class="card"><h3>Distraktorer</h3><div class="small">Elementer i periferien.</div><div class="btns" id="distBtns"></div></div>
      <div class="card"><h3>Spillertype</h3><div class="small">Tilpasser antall valg.</div><div class="btns" id="modeBtns"></div><label><input type="checkbox" id="showAnswer" checked> Vis fasit etter feil</label><br><label><input type="checkbox" id="sound"> Spill lyd</label></div>
      <button class="start" id="startBtn">▶<br>START SPILL</button>
    </div>
  </section>

  <div class="overlay" id="overlay"><div class="modal"><h2 id="question">Hvilken bil så du?</h2><div class="carChoices" id="carChoices"></div><div class="feedback" id="feedback"></div></div></div>
</div>
<script>
const carDefs=[{id:'redCar',type:'car',name:'Rød bil',color:'#d72825'},{id:'blueCar',type:'car',name:'Blå bil',color:'#146bd3'},{id:'greenVan',type:'van',name:'Grønn varebil',color:'#59a72f'},{id:'yellowVan',type:'van',name:'Gul varebil',color:'#e4ad20'}];
const signs=['🛑','⚠️','🚸','🚫','⛔']; const propsEm=['🌳','🚏','💡','🗑️','🪧','🪑','🚲','🧱'];
const times=[.25,.5,.75,1,1.5,2,3], speeds=[5,10,15,20,25], dists=[['Få',4],['Medium',8],['Mange',16],['Ekstrem',24]], modes=['Barn','Standard','Ekspert'];
let cfg={time:1,speed:10,dist:8,mode:'Standard',target:'🛑'}, score=0,level=1,rounds=0,hits=0,rtSum=0,streak=0,miss=0,phase='idle',currentCar,signPos,carOK=false,startMs=0;
const $=id=>document.getElementById(id); const scene=$('scene'), stimuli=$('stimuli'), props=$('props'), markers=$('markers');
function carSvg(c){const van=c.type==='van'; return `<svg viewBox="0 0 220 95" aria-label="${c.name}"><defs><linearGradient id="g${c.id}" x1="0" x2="1"><stop stop-color="${c.color}"/><stop offset="1" stop-color="#111" stop-opacity=".25"/></linearGradient></defs><path d="M25 55 C35 30 52 22 84 22 H${van?155:132} C170 23 185 38 198 56 L204 72 H16 Z" fill="url(#g${c.id})" stroke="#111" stroke-width="3"/><path d="M66 28 H112 L126 54 H46 C50 42 56 33 66 28 Z" fill="#bfe4ff" opacity=".82"/><path d="M130 29 H154 L180 54 H136 Z" fill="#bfe4ff" opacity=".72"/><circle cx="55" cy="74" r="14" fill="#111"/><circle cx="165" cy="74" r="14" fill="#111"/><circle cx="55" cy="74" r="6" fill="#aaa"/><circle cx="165" cy="74" r="6" fill="#aaa"/></svg>`}
function mkBtns(id,arr,get,set,label=x=>x){$(id).innerHTML=arr.map(x=>`<button class="opt ${get(x)?'sel':''}" data-v="${Array.isArray(x)?x[1]:x}">${label(x)}</button>`).join(''); [...$(id).children].forEach((b,i)=>b.onclick=()=>{set(arr[i]); renderControls();});}
function renderControls(){mkBtns('signBtns',signs,x=>cfg.target===x,x=>{cfg.target=x;$('targetHud').textContent=x},x=>x);mkBtns('timeBtns',times,x=>cfg.time===x,x=>cfg.time=x,x=>String(x).replace('.',',')+' s');mkBtns('speedBtns',speeds,x=>cfg.speed===x,x=>cfg.speed=x);mkBtns('distBtns',dists,x=>cfg.dist===x[1],x=>cfg.dist=x[1],x=>`${x[0]} (${x[1]})`);mkBtns('modeBtns',modes,x=>cfg.mode===x,x=>{cfg.mode=x;if(x==='Barn'){cfg.time=Math.max(cfg.time,1);cfg.dist=Math.min(cfg.dist,4)}},x=>x);$('introCars').innerHTML=carDefs.map(carSvg).join('');$('targetHud').textContent=cfg.target;}
function updateHud(){ $('score').textContent=score; $('level').textContent=level; $('hit').textContent=rounds?Math.round(hits/rounds*100)+'%':'–%'; $('avg').textContent=rounds?(rtSum/rounds/1000).toFixed(2).replace('.',',')+'s':'–s'; }
function randomPos(){ const xs=[12,22,34,66,78,88], ys=[24,34,45,56,68]; return {x:xs[Math.floor(Math.random()*xs.length)],y:ys[Math.floor(Math.random()*ys.length)]}; }
function drawProps(){props.innerHTML=''; const count=cfg.mode==='Barn'?Math.min(4,cfg.dist):cfg.dist; for(let i=0;i<count;i++){let p=randomPos(), em=propsEm[Math.floor(Math.random()*propsEm.length)]; props.insertAdjacentHTML('beforeend',`<div class="prop" style="left:${p.x}%;top:${p.y}%">${em}</div>`);} if(cfg.mode!=='Barn'){ for(let i=0;i<Math.min(4,Math.floor(count/4));i++){let p=randomPos(), s=signs.filter(s=>s!==cfg.target)[Math.floor(Math.random()*4)]; props.insertAdjacentHTML('beforeend',`<div class="prop" style="left:${p.x}%;top:${p.y}%">${s}</div>`);}}
}
function startGame(){score=0;level=1;rounds=0;hits=0;rtSum=0;streak=0;miss=0;updateHud();$('startPanel').classList.add('hide'); nextRound();}
function nextRound(){phase='show'; carOK=false; markers.innerHTML=''; stimuli.innerHTML=''; drawProps(); const pool=cfg.mode==='Barn'?carDefs.slice(0,2):carDefs; currentCar=pool[Math.floor(Math.random()*pool.length)]; signPos=randomPos(); stimuli.innerHTML=`<div class="stim carStim">${carSvg(currentCar)}</div><div class="stim signStim" style="left:${signPos.x}%;top:${signPos.y}%">${cfg.target}</div>`; startMs=performance.now(); setTimeout(()=>{stimuli.innerHTML=''; askCar();},cfg.time*1000);}
function askCar(){phase='car'; $('overlay').style.display='flex'; $('question').textContent='Hvilken bil så du?'; $('feedback').textContent=''; const pool=cfg.mode==='Barn'?carDefs.slice(0,2):carDefs; $('carChoices').innerHTML=pool.map(c=>`<button class="carChoice" data-id="${c.id}">${carSvg(c)}<div>${c.name}</div></button>`).join(''); [...$('carChoices').children].forEach(b=>b.onclick=()=>{carOK=b.dataset.id===currentCar.id; askLocation();});}
function askLocation(){phase='loc'; $('overlay').style.display='none'; markers.innerHTML=''; scene.onclick=e=>{ if(phase!=='loc')return; const r=scene.getBoundingClientRect(); const x=(e.clientX-r.left)/r.width*100,y=(e.clientY-r.top)/r.height*100; answerLoc(x,y);};}
function answerLoc(x,y){phase='done'; scene.onclick=null; const rt=performance.now()-startMs; const dist=Math.hypot(x-signPos.x,y-signPos.y); const locOK=dist<12; const both=carOK&&locOK; rounds++; rtSum+=rt; if(both){hits++; streak++; miss=0; const mult={5:1,10:1.2,15:1.5,20:2,25:3}[cfg.speed]; score+=Math.round(300*mult); if(streak>=3){level++; streak=0; cfg.time=Math.max(cfg.mode==='Barn'?1:.25,cfg.time-.1); cfg.dist=Math.min(cfg.mode==='Ekspert'?24:16,cfg.dist+2);} } else {miss++; streak=0; if(miss>=3){cfg.time=Math.min(3,cfg.time+.2); cfg.dist=Math.max(4,cfg.dist-2); miss=0;} }
 updateHud(); if(!both && $('showAnswer').checked){markers.innerHTML=`<div class="tapMarker" style="left:${x}%;top:${y}%">❌</div><div class="tapMarker" style="left:${signPos.x}%;top:${signPos.y}%">✅</div>`; setTimeout(nextRound,1200);} else setTimeout(nextRound,650);}
$('startBtn').onclick=startGame; renderControls(); drawProps(); updateHud();
</script>
</body>
</html>
